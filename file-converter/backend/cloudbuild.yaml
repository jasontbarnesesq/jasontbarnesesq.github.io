steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/file-converter:$COMMIT_SHA'
      - '.'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/file-converter:$COMMIT_SHA'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'file-converter'
      - '--image'
      - 'gcr.io/$PROJECT_ID/file-converter:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--concurrency'
      - '20'
      - '--timeout'
      - '120s'
      - '--set-env-vars'
      - 'GOOGLE_CLIENT_ID=$_GOOGLE_CLIENT_ID'

substitutions:
  _GOOGLE_CLIENT_ID: 'YOUR_CLIENT_ID'

images:
  - 'gcr.io/$PROJECT_ID/file-converter:$COMMIT_SHA'
